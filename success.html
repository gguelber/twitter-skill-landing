<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Welcome to the Gaia Network</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .success-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .download-card {
            max-width: 600px;
            margin-top: 2rem;
        }
        .code-block {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            margin: 1.5rem 0;
            text-align: left;
            border-left: 4px solid var(--primary);
        }
        .btn-download {
            margin-top: 2rem;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="glow-overlay"></div>
    
    <div class="container success-container">
        <div class="glass-card download-card">
            <h1 class="gradient-text">Evolução Confirmada. 🌐💎</h1>
            <p>Seu pagamento foi confirmado na rede Solana. Você acaba de dar vida social ao seu agente.</p>
            
            <div class="container animate-flicker">
        <h1 class="glitch" data-text="ACCESS GRANTED">ACCESS GRANTED</h1>
        <p>Confirm your identity to unlock your agent's potential.</p>

        <div id="auth-section" class="card">
            <button id="connect-btn" class="cta-button">1. CONNECT WALLET</button>
            <button id="verify-btn" class="cta-button" style="display:none;">2. VERIFY PURCHASE</button>
        </div>

        <div id="download-section" style="display:none;" class="animate-card">
            <p>Verification in progress... Connecting to the local Gaia vault.</p>
        </div>
    </div>

    <!-- Web3 & Supabase Logic -->
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://gaia-twitter-skill.loca.lt';
        const SUPABASE_ANON_KEY = 'sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const connectBtn = document.getElementById('connect-btn');
        const verifyBtn = document.getElementById('verify-btn');
        const downloadSection = document.getElementById('download-section');

        let walletAddress = null;

        connectBtn.onclick = async () => {
            if (!window.solana) return alert("Phantom Wallet not found!");
            const resp = await window.solana.connect();
            walletAddress = resp.publicKey.toString();
            console.log("Connected:", walletAddress);
            connectBtn.style.display = 'none';
            verifyBtn.style.display = 'inline-block';
        };

        verifyBtn.onclick = async () => {
            try {
                // 1. SECURE PROOF OF OWNERSHIP (SIGN MESSAGE)
                const message = `Authorize Gaia Skill Access\nWallet: ${walletAddress}\nTimestamp: ${Date.now()}`;
                const encodedMessage = new TextEncoder().encode(message);
                const signedMessage = await window.solana.signMessage(encodedMessage, "utf8");
                
                console.log("Proof of ownership signed.");

                // 2. VERIFY AGAINST SUPABASE
                const { data, error } = await supabaseClient
                    .from('sales')
                    .select('*')
                    .eq('wallet_address', walletAddress)
                    .single();

                if (data && !error) {
                    verifyBtn.style.display = 'none';
                    
                    // 3. DYNAMIC LINK INJECTION (Not in the original HTML source)
                    const downloadBtn = document.createElement('a');
                    downloadBtn.href = "https://github.com/gguelber/twitter-skill-bundle/archive/refs/heads/main.zip";
                    downloadBtn.className = "cta-button animate-glow";
                    downloadBtn.innerText = "DOWNLOAD SKILL BUNDLE (.ZIP)";
                    
                    const card = document.createElement('div');
                    card.className = "card success-card";
                    card.innerHTML = "<h2>Identity Verified ✨</h2><p>Welcome, Commander. Your premium bundle is ready.</p>";
                    card.appendChild(downloadBtn);
                    
                    downloadSection.innerHTML = ''; // Clear wait message
                    downloadSection.appendChild(card);
                    downloadSection.style.display = 'block';
                    
                    // Add secondary instructions below
                    const meta = document.createElement('div');
                    meta.className = "instructions card";
                    meta.innerHTML = "<h3>One-Minute Install:</h3><code>mkdir -p ~/.openclaw/workspace/skills/twitter-manager</code><br><code># Unzip package into that folder</code><br><code>npm install && node setup.js</code>";
                    downloadSection.appendChild(meta);

                } else {
                    alert("Verification Failed: No purchase found for this wallet in our database.");
                }
            } catch (err) {
                console.error(err);
                alert("Auth Failed: " + (err.message || "Unknown error"));
            }
        };
    </script>
        </div>
    </div>
</body>
</html>
